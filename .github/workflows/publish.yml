# Publish the CLI to npm when a cli-vX.Y.Z tag is pushed (M8). The release
# ritual lives in docs/specs/distribution.md: bump package.json version →
# merge → push the matching tag. Two guards run before anything else: the tag
# must match package.json's version, and the tagged commit must be on main —
# so neither a mistyped tag nor a tagged side-branch commit can publish.
#
# Auth: npm Trusted Publishing (OIDC) — this repo + this workflow file are
# registered as the package's trusted publisher on npmjs.com, so no token or
# secret is involved; the runner's OIDC identity (id-token: write) is the
# credential, and npm generates provenance automatically. The original
# NPM_TOKEN bootstrap (Trusted Publishing can't be configured before a
# package exists) published 1.0.0 and was then retired.
name: Publish CLI

on:
  push:
    tags: ['cli-v*']

permissions:
  contents: read
  # The OIDC identity IS the publish credential under Trusted Publishing
  # (and feeds the automatic provenance attestation).
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          # Full history so the guard can check main ancestry.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Guards run BEFORE npm ci so a bad tag never executes third-party
      # install lifecycle scripts. (1) The tag IS the version claim, so it
      # must match package.json exactly — same three-way-agreement spirit as
      # the plugin's release tests. (2) The tagged commit must be reachable
      # from main, so a tagged side-branch commit (bumped version, no review)
      # cannot publish.
      - name: Guard — tag matches package.json version and is on main
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag cli-v$TAG_VERSION does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tagged commit $GITHUB_SHA is not on main — refusing to publish unreviewed code" >&2
            exit 1
          fi

      # Trusted Publishing needs npm >= 11.5.1 (Node 22 bundles 10.x). Pinned
      # to the v11 line so a future npm major dropping Node 22 can't break an
      # unattended release. Runs before npm ci so every step — install,
      # verify, pack, publish — uses the same npm.
      - name: Update npm for OIDC publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      # Last gate: prove the artifact, not the working tree (tarball contents,
      # installed bin executes, generated project verifies).
      - name: Pack test
        run: npm run test:pack

      # No token: npm exchanges the runner's OIDC token with the registry's
      # trusted-publisher config. Provenance is attached automatically.
      # Verbose logging because npm swallows OIDC-exchange failures silently
      # (a publisher mismatch otherwise surfaces as an opaque auth error);
      # npm redacts tokens in logs. Drop once the OIDC path has proven out.
      - name: Publish to npm
        run: npm publish --access public --loglevel verbose
