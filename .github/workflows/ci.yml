name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # The agent-smoke job spends tokens against a live Claude, so it never runs on
  # push/PR — a maintainer triggers it by hand from the Actions tab.
  workflow_dispatch:

# Least privilege: these jobs only read the repo. The boot job in particular
# runs third-party npm install lifecycle scripts, so it should carry no
# write-capable token.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Check formatting
        run: npx prettier --check .

      - name: Run tests
        run: npm test

      # Lint the generated shell (init-firewall.sh) with shellcheck, which
      # ubuntu runners ship preinstalled. Catches quoting/word-splitting bugs the
      # substring assertions in vitest can't. SKIPs cleanly where shellcheck is
      # absent (e.g. a dev box), so it's never a false red locally.
      - name: Lint generated shell
        run: npm run lint:shell

  # Self-verification boot test (design brief §7.2): generate each template and
  # prove it actually installs + verifies. One leg per template so they run in
  # parallel and a failure points at the exact template. Separate from `test`
  # (not gated behind it) so the fast unit/lint feedback isn't held up by the
  # multi-minute installs. fail-fast off so one template's failure doesn't
  # cancel the others.
  boot:
    name: Boot ${{ matrix.template }}
    runs-on: ubuntu-latest
    # Bound a hung or malicious install lifecycle script (default is 360 min).
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        template: [none, node-ts, react-vite-ts, nextjs-ts]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        # Don't leave the token in .git/config — this job runs third-party
        # install scripts in the same workspace.
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Boot ${{ matrix.template }}
        run: npm run test:boot -- ${{ matrix.template }}

  # Pack test (M8): prove the npm artifact, not just the working tree. Packs
  # the tarball, asserts its contents (runtime files in, colocated tests out),
  # installs it into a clean prefix, and scaffolds + verifies a `none` project
  # from the INSTALLED package. Cheap enough to gate every PR; the publish
  # workflow reuses it as the last gate before `npm publish`.
  pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pack test
        run: npm run test:pack

  # Opt-in subagent runtime smoke test (design brief §7.3 / §11): proves a
  # generated project loads the claude-guardrails plugin and its code-reviewer
  # subagent is invokable by name and returns a review against a live Claude —
  # the one self-verification layer that needs an API key and so can't run on
  # every PR. Manual-only (workflow_dispatch). Without the ANTHROPIC_API_KEY
  # secret the script SKIPs cleanly (exit 0), so a fork without the secret won't
  # fail. Normal CI relies on the always-on structural loadability +
  # enablement-resolution proxies in plugin.test.js instead.
  agent-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        # This job installs a third-party CLI globally and runs an LLM agent;
        # don't leave a repo-write token in .git/config for it to find.
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Subagent smoke test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run test:agent-smoke

  # Opt-in network-firewall boot smoke (M9 Option A): actually builds a
  # firewalled image and runs init-firewall.sh under NET_ADMIN, proving the
  # reset preserves Docker's embedded DNS and the default-DROP allowlist holds —
  # runtime behavior the vitest substring checks can't reach. Manual-only
  # (workflow_dispatch): it's network-dependent (apt-get, api.github.com/meta,
  # npm, example.com), so gating keeps that flakiness off every PR. ubuntu
  # runners ship Docker and allow --cap-add; where docker is absent the script
  # SKIPs (exit 0).
  firewall-boot:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Firewall boot smoke
        run: npm run test:firewall-boot

  # Plugin auto-install check: proves the devcontainer postCreate mechanism —
  # `claude plugin install claude-guardrails@claude-scaffold` against a generated
  # project's real GitHub-source settings.json — actually installs the plugin
  # non-interactively (required since Claude Code v2.1.195). No API key needed
  # (install fetches from GitHub, doesn't call the model); SKIPs without the CLI.
  # Manual-only (workflow_dispatch): network-dependent (installs the CLI + fetches
  # the marketplace), so gating keeps that flakiness off every PR.
  plugin-install:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Plugin auto-install check
        run: npm run test:plugin-install
